<script>
    let isPracticeMode = true;
    let targetNumber = 20;
    let currentRound = 1;
    let playerScore = 0;
    let computerScore = 0;
    let playerExpression = '';
    let playerCards = [];
    let computerCards = [];
    let roundCompleted = false;
    let originalPlayerCards = [];
    let numberDeck = [];
    let operatorDeck = [];
    const PI_VALUE = 3.14;

    const createNumberDeck = () => {
        const deck = [];
        for (let num = 0; num <= 9; num++) {
            deck.push(num, num);
        }
        deck.push('π');
        return shuffleArray(deck);
    };

    const createOperatorDeck = () => {
        const deck = [];
        for (let i = 0; i < 5; i++) deck.push('+');
        for (let i = 0; i < 5; i++) deck.push('-');
        for (let i = 0; i < 5; i++) deck.push('*');
        for (let i = 0; i < 5; i++) deck.push('/');
        deck.push('√');
        return shuffleArray(deck);
    };

    const shuffleArray = (array) => {
        const shuffled = [...array];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
    };

    const drawCards = () => {
        if (numberDeck.length < 4) {
            numberDeck = createNumberDeck();
        }
        if (operatorDeck.length < 4) {
            operatorDeck = createOperatorDeck();
        }
        const drawnNumbers = numberDeck.splice(0, 4);
        const drawnOperators = operatorDeck.splice(0, 4);
        return [...drawnNumbers, ...drawnOperators];
    };

    const calculateSquareRoot = (num) => {
        const result = Math.sqrt(num);
        return Math.round(result * 100) / 100;
    };

    const calculateValue = (expression) => {
        if (/π\d+/.test(expression)) {
            throw new Error('Cannot have numbers directly after π');
        }
        let processedExpr = expression;
        processedExpr = processedExpr.replace(/(\d+)π/g, `$1*${PI_VALUE}`);
        processedExpr = processedExpr.replace(/π/g, PI_VALUE);
        processedExpr = processedExpr.replace(/×/g, '*');
        processedExpr = processedExpr.replace(/÷/g, '/');
        processedExpr = processedExpr.replace(/(\d+\.?\d*)√(\d+\.?\d*)/g, (match, num1, num2) => {
            const sqrtResult = calculateSquareRoot(parseFloat(num2));
            return `${num1}*${sqrtResult}`;
        });
        processedExpr = processedExpr.replace(/√(\d+\.?\d*)/g, (match, num) => {
            return calculateSquareRoot(parseFloat(num));
        });
        try {
            return eval(processedExpr);
        } catch (error) {
            throw new Error('Invalid expression');
        }
    };

    const findBestExpression = (cards) => {
    let bestExpr = '';
    let bestDiff = Infinity;

    // 카드 사용 가능 횟수 계산
    const cardCounts = {};
    cards.forEach(card => {
        cardCounts[card] = (cardCounts[card] || 0) + 1;
    });

    const tryExpression = (expr) => {
        try {
            const val = calculateValue(expr);
            if (isNaN(val) || !isFinite(val)) return;
            const diff = Math.abs(targetNumber - val);
            if (diff < bestDiff) {
                bestDiff = diff;
                bestExpr = expr;
            }
        } catch (e) {}
    };

    const getDisplayOp = (op) => {
        if (op === '*') return '×';
        if (op === '/') return '÷';
        return op;
    };

    // 카드를 사용하는 함수
    const useCard = (counts, card) => {
        if (counts[card] > 0) {
            counts[card]--;
            return true;
        }
        return false;
    };

    const numbers = cards.filter(c => !isNaN(c) || c === 'π');
    const operators = cards.filter(c => isNaN(c) && c !== 'π');

    // 1. 단일 숫자
    numbers.forEach(num => {
        const counts = {...cardCounts};
        if (useCard(counts, num)) {
            tryExpression(num.toString());
        }
    });

    // 2. 2자리 숫자 만들기
    for (let i = 0; i < numbers.length; i++) {
        for (let j = 0; j < numbers.length; j++) {
            if (numbers[i] !== 'π' && numbers[j] !== 'π') {
                const counts = {...cardCounts};
                if (useCard(counts, numbers[i]) && useCard(counts, numbers[j])) {
                    const twoDigit = parseInt(`${numbers[i]}${numbers[j]}`);
                    if (twoDigit.toString()[0] !== '0') {
                        tryExpression(twoDigit.toString());
                    }
                }
            }
        }
    }

    // 3. 3자리 숫자 만들기
    for (let i = 0; i < numbers.length; i++) {
        for (let j = 0; j < numbers.length; j++) {
            for (let k = 0; k < numbers.length; k++) {
                if (numbers[i] !== 'π' && numbers[j] !== 'π' && numbers[k] !== 'π') {
                    const counts = {...cardCounts};
                    if (useCard(counts, numbers[i]) && useCard(counts, numbers[j]) && useCard(counts, numbers[k])) {
                        const threeDigit = parseInt(`${numbers[i]}${numbers[j]}${numbers[k]}`);
                        if (threeDigit.toString()[0] !== '0') {
                            tryExpression(threeDigit.toString());
                        }
                    }
                }
            }
        }
    }

    // 4. √ 연산
    if (operators.includes('√')) {
        numbers.forEach(num => {
            if (num !== 'π') {
                const counts = {...cardCounts};
                if (useCard(counts, '√') && useCard(counts, num)) {
                    tryExpression(`√${num}`);
                }
            }
        });

        // 숫자 √ 숫자 패턴
        numbers.forEach(num1 => {
            numbers.forEach(num2 => {
                if (num1 !== 'π' && num2 !== 'π') {
                    const counts = {...cardCounts};
                    if (useCard(counts, num1) && useCard(counts, '√') && useCard(counts, num2)) {
                        tryExpression(`${num1}√${num2}`);
                    }
                }
            });
        });
    }

    // 5. 기본 연산 (2개 숫자)
    const basicOps = operators.filter(op => op !== '√');
    basicOps.forEach(op => {
        for (let i = 0; i < numbers.length; i++) {
            for (let j = 0; j < numbers.length; j++) {
                const counts = {...cardCounts};
                if (useCard(counts, numbers[i]) && useCard(counts, op) && useCard(counts, numbers[j])) {
                    tryExpression(`${numbers[i]}${getDisplayOp(op)}${numbers[j]}`);
                }
            }
        }
    });

    // 6. 2자리수 + 연산 + 숫자
    basicOps.forEach(op => {
        for (let i = 0; i < numbers.length; i++) {
            for (let j = 0; j < numbers.length; j++) {
                for (let k = 0; k < numbers.length; k++) {
                    if (numbers[i] !== 'π' && numbers[j] !== 'π') {
                        const counts = {...cardCounts};
                        if (useCard(counts, numbers[i]) && useCard(counts, numbers[j]) && useCard(counts, op) && useCard(counts, numbers[k])) {
                            const twoDigit = parseInt(`${numbers[i]}${numbers[j]}`);
                            if (twoDigit.toString()[0] !== '0') {
                                tryExpression(`${twoDigit}${getDisplayOp(op)}${numbers[k]}`);
                                tryExpression(`${numbers[k]}${getDisplayOp(op)}${twoDigit}`);
                            }
                        }
                    }
                }
            }
        }
    });

      // 7. 3개 숫자 + 2개 연산자
    if (basicOps.length >= 2) {
        for (let i = 0; i < numbers.length; i++) {
            for (let j = 0; j < numbers.length; j++) {
                for (let k = 0; k < numbers.length; k++) {
                    basicOps.forEach((op1, x) => {
                        basicOps.forEach((op2, y) => {
                            if (x !== y) {
                                const counts = {...cardCounts};
                                if (useCard(counts, numbers[i]) && useCard(counts, op1) && 
                                    useCard(counts, numbers[j]) && useCard(counts, op2) && 
                                    useCard(counts, numbers[k])) {
                                    tryExpression(`${numbers[i]}${getDisplayOp(op1)}${numbers[j]}${getDisplayOp(op2)}${numbers[k]}`);
                                }
                            }
                        });
                    });
                }
            }
        }
    }

    // 8. 4개 숫자 + 3개 연산자
    if (basicOps.length >= 3) {
        for (let i = 0; i < numbers.length; i++) {
            for (let j = 0; j < numbers.length; j++) {
                for (let k = 0; k < numbers.length; k++) {

                                    if (x !== y && y !== z && x !== z) {
                                        const counts = {...cardCounts};
                                        if (useCard(counts, numbers[i]) && useCard(counts, op1) && 
                                            useCard(counts, numbers[j]) && useCard(counts, op2) && 
                                            useCard(counts, numbers[k]) && useCard(counts, op3) &&

                                            tryExpression(`${numbers[i]}${getDisplayOp(op1)}${numbers[j]}${getDisplayOp(op2)}${numbers[k]}${getDisplayOp(op3)}${numbers[l]}`);
                                        }
                                    }
                                });
                            });
                        });
                    }
                }
            }
        }
    }

    return { expr: bestExpr || numbers[0]?.toString() || '0' };
};

    projectId: "numzzle",

    messagingSenderId: "918203163480",
    appId: "1:918203163480:web:fe54528bb7266091c03b2d"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function saveScoreAndShowPercentile(gameMode, score) {
    try {
      // 기존 분포 지우기
      const resultArea = document.getElementById('resultArea');
      resultArea.querySelectorAll('.score-chart').forEach(el => el.remove());

      // 점수 저장
      await addDoc(collection(db, "scores"), {
        mode: gameMode,
        score: score,
        createdAt: new Date()
      });

      // 같은 모드 전체 점수 가져오기
      const q = query(collection(db, "scores"), where("mode", "==", gameMode));
      const snapshot = await getDocs(q);
      const allScores = snapshot.docs.map(d => d.data().score);
      const total = allScores.length;

      // 점수별 개수 세기
      const scoreCount = {};
      allScores.forEach(s => {
        scoreCount[s] = (scoreCount[s] || 0) + 1;
      });

      // 점수 높은 순으로 정렬
      const sorted = Object.keys(scoreCount)
        .map(Number)
        .sort((a, b) => b - a);

      // 제목
      const title = document.createElement('p');
      title.className = 'score-chart';
      title.style.fontWeight = 'bold';
      title.style.marginTop = '10px';
      title.style.color = '#145454';


title.textContent = '📊 Score Distribution';



      resultArea.appendChild(title);

      // 분포 막대 표시
      sorted.forEach(s => {
        const pct = Math.round((scoreCount[s] / total) * 100);
        const filled = Math.round(pct / 5);
        const bar = '█'.repeat(filled) + '░'.repeat(20 - filled);

        const p = document.createElement('p');
        p.className = 'score-chart';
        p.style.fontFamily = 'monospace';
        p.style.fontSize = '1rem';
        p.style.color = s == score ? '#d84315' : '#555';
        p.style.fontWeight = s == score ? 'bold' : 'normal';
        
p.textContent = `${String(s).padStart(3)}pts ${bar} ${pct}%`;
        resultArea.appendChild(p);
      });

    } catch(e) {
      console.error('Firebase 오류:', e);
    }
  }

  window.saveScoreAndShowPercentile = saveScoreAndShowPercentile;
</script>
