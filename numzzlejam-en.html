<script>
    

    let isPracticeMode = true;
    let targetNumber = 20;
    let currentRound = 1;
    let userScore = 0;
    let computerScore = 0;
    let userExpression = '';
    let userCards = [];
    let computerCards = [];
    let roundCompleted = false;
    let isBuildingNumber = false;
    let originalUserCards = [];

    // 카드덱 생성
const createNumberDeck = () => {
  const deck = [];
  // 0~9: 각 8장씩
  for (let num = 0; num <= 9; num++) {
    for (let i = 0; i < 8; i++) deck.push(num);
  }
  return deck;
};

const createOperatorDeck = () => {
  const deck = [];
  // +: 30장, -: 30장, ×: 20장
  for (let i = 0; i < 30; i++) deck.push('+');
  for (let i = 0; i < 30; i++) deck.push('-');
  for (let i = 0; i < 20; i++) deck.push('*');
  return deck;
};

// 덱 섞기 및 카드 뽑기
const shuffleAndDraw = (deck, count) => {
  const shuffled = [...deck].sort(() => 0.5 - Math.random());
  return shuffled.slice(0, count);
};

// 카드 생성 (7장: 숫자 4장 + 연산 3장)
const generateCards = () => {
  const numberDeck = createNumberDeck();
  const operatorDeck = createOperatorDeck();
  
  const numbers = shuffleAndDraw(numberDeck, 4);
  const operators = shuffleAndDraw(operatorDeck, 3);
  
  return [...numbers, ...operators];
};
const renderPlayerCards = () => {
  const playerCardsArea = document.getElementById('playerCardsArea');
  playerCardsArea.innerHTML = '';
  userCards.forEach((card, index) => {
    const btn = document.createElement('button');
    btn.className = 'card-button';
    btn.textContent = card === '*' ? '×' : card;
    
    // data-card-value 속성 추가
    btn.setAttribute('data-card-value', card);
    
    // 연산자인 경우 스타일 추가
    if (isNaN(card)) {
      btn.classList.add('operator-card');
    }
btn.onclick = () => {
  if (!roundCompleted) {
    if (!isNaN(card)) {
      // 숫자 카드 클릭 시: 0으로 시작하는 다자리 숫자 완전 차단
      const lastNumberMatch = userExpression.match(/(\d+)$/);
      
      // 현재 숫자가 "0"으로만 되어 있으면 추가 숫자 입력 차단
      if (lastNumberMatch && lastNumberMatch[0] === '0') {
        alert('Numbers cannot start with 0!');
        return;
      }
      
      // 새로 숫자를 시작할 때 (연산자 다음) 0이면서 다음에 또 숫자를 입력하려는 경우
      if (!isBuildingNumber && card === 0) {
        // 0을 입력하되, 다음 입력을 막기 위해 특별 표시는 하지 않고 그냥 추가
      }

      if (isBuildingNumber) userExpression += card;
      else userExpression += card, isBuildingNumber = true;
    } else {
      userExpression += (card === '*' ? '×' : card);
      isBuildingNumber = false;
    }
    document.getElementById('playerExpression').textContent = userExpression;
    btn.classList.add('used');
    btn.onclick = null;
  }
};
    playerCardsArea.appendChild(btn);
  });
};


const renderComputerCards = () => {
  const computerCardsArea = document.getElementById('computerCardsArea');
  computerCardsArea.innerHTML = '';
  computerCards.forEach(card => {
    const span = document.createElement('span');
    span.className = 'card-button';
    span.textContent = card === '*' ? '×' : card;
    
    // data-card-value 속성 추가
    span.setAttribute('data-card-value', card);
    
    // 연산자인 경우 스타일 추가
    if (isNaN(card)) {
      span.classList.add('operator-card');
    }
    
    computerCardsArea.appendChild(span);
  });
};



// 컴퓨터가 최적의 답을 찾는 함수
const findBestExpression = (cards) => {
  const numbers = cards.filter(c => !isNaN(c));
  const operators = cards.filter(c => isNaN(c));
  let bestExpr = '';
  let bestVal = Infinity;
  let bestDiff = Infinity;
  let usedCards = [];

  // 숫자 하나만 내는 경우
  numbers.forEach(num => {
    const val = Number(num);
    const diff = Math.abs(targetNumber - val);
    if (diff < bestDiff) {
      bestDiff = diff;
      bestVal = val;
      bestExpr = `${num}`;
      usedCards = [num];
    }
  });

// 2자리 숫자 만들기 (연속 숫자 결합)
if (numbers.length >= 2) {
  numbers.forEach((a, i) => {
    numbers.forEach((b, j) => {
      if (i !== j && a !== 0) {  // ← a !== 0 조건 추가!
        const combined = Number(`${a}${b}`);
        const diff = Math.abs(targetNumber - combined);
        if (diff < bestDiff) {
          bestDiff = diff;
          bestVal = combined;
          bestExpr = `${a}${b}`;
          usedCards = [a, b];
        }
      }
    });
  });
}

// 3자리 숫자 만들기
if (numbers.length >= 3) {
  numbers.forEach((a, i) => {
    numbers.forEach((b, j) => {
      numbers.forEach((c, k) => {
        if (i !== j && j !== k && i !== k && a !== 0) {  // ← a !== 0 조건 추가!
          const combined = Number(`${a}${b}${c}`);
          const diff = Math.abs(targetNumber - combined);
          if (diff < bestDiff) {
            bestDiff = diff;
            bestVal = combined;
            bestExpr = `${a}${b}${c}`;
            usedCards = [a, b, c];
          }
        }
      });
    });
  });
}
// 4자리 숫자 만들기
if (numbers.length >= 4) {
  numbers.forEach((a, i) => {
    numbers.forEach((b, j) => {
      numbers.forEach((c, k) => {
        numbers.forEach((d, l) => {
          if (i !== j && j !== k && i !== k && k !== l && i !== l && j !== l && a !== 0) {  // ← a !== 0 조건 추가!
            const combined = Number(`${a}${b}${c}${d}`);
            const diff = Math.abs(targetNumber - combined);
            if (diff < bestDiff) {
              bestDiff = diff;
              bestVal = combined;
              bestExpr = `${a}${b}${c}${d}`;
              usedCards = [a, b, c, d];
            }
          }
        });
      });
    });
  });
}
  // 2개 숫자 + 1개 연산자
  if (numbers.length >= 2 && operators.length >= 1) {
    numbers.forEach((a, i) => {
      numbers.forEach((b, j) => {
        if (i !== j) {
          operators.forEach(op => {
            try {
              const expr = `${a}${op}${b}`;
              const val = eval(expr);
              const diff = Math.abs(targetNumber - val);
              if (diff < bestDiff) {
                bestDiff = diff;
                bestVal = val;
                bestExpr = expr.replace(/\*/g, '×');
                usedCards = [a, b, op];
              }
            } catch {}
          });
        }
      });
    });
  }

  // 2자리 숫자 + 연산자 + 숫자
if (numbers.length >= 3 && operators.length >= 1) {
  numbers.forEach((a, i) => {
    numbers.forEach((b, j) => {
      numbers.forEach((c, k) => {

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC6YiE5GrtEwyIU4KHgcODSdQpiWzMT3ic",
    authDomain: "numzzle.firebaseapp.com",
    projectId: "numzzle",
    storageBucket: "numzzle.firebasestorage.app",
    messagingSenderId: "918203163480",
    appId: "1:918203163480:web:fe54528bb7266091c03b2d"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function saveScoreAndShowPercentile(gameMode, score) {
    try {
      // 기존 분포 지우기
      const resultArea = document.getElementById('resultArea');
      resultArea.querySelectorAll('.score-chart').forEach(el => el.remove());

      // 점수 저장
      await addDoc(collection(db, "scores"), {
        mode: gameMode,
        score: score,
        createdAt: new Date()
      });

      // 같은 모드 전체 점수 가져오기
      const q = query(collection(db, "scores"), where("mode", "==", gameMode));
      const snapshot = await getDocs(q);
      const allScores = snapshot.docs.map(d => d.data().score);
      const total = allScores.length;

      // 점수별 개수 세기
      const scoreCount = {};
      allScores.forEach(s => {
        scoreCount[s] = (scoreCount[s] || 0) + 1;
      });

      // 점수 높은 순으로 정렬
      const sorted = Object.keys(scoreCount)
        .map(Number)
        .sort((a, b) => b - a);

      // 제목
      const title = document.createElement('p');
      title.className = 'score-chart';
      title.style.fontWeight = 'bold';
      title.style.marginTop = '10px';
      title.style.color = '#145454';


title.textContent = '📊 Score Distribution';



      resultArea.appendChild(title);

      // 분포 막대 표시
      sorted.forEach(s => {
        const pct = Math.round((scoreCount[s] / total) * 100);
        const filled = Math.round(pct / 5);
        const bar = '█'.repeat(filled) + '░'.repeat(20 - filled);

        const p = document.createElement('p');
        p.className = 'score-chart';
        p.style.fontFamily = 'monospace';
        p.style.fontSize = '1rem';
        p.style.color = s == score ? '#d84315' : '#555';
        p.style.fontWeight = s == score ? 'bold' : 'normal';
        
p.textContent = `${String(s).padStart(3)}pts ${bar} ${pct}%`;
        resultArea.appendChild(p);
      });

    } catch(e) {
      console.error('Firebase 오류:', e);
    }
  }

  window.saveScoreAndShowPercentile = saveScoreAndShowPercentile;
</script>
